{% load i18n %}
<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Kuryer Paneli</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --c-bg: #F4F6FB;
            --c-white: #FFFFFF;
            --c-paid: #F59E0B;
            --c-paid-light: #FEF3C7;
            --c-paid-dark: #D97706;
            --c-delivering: #3B82F6;
            --c-delivering-light: #DBEAFE;
            --c-delivering-dark: #2563EB;
            --c-done: #10B981;
            --c-done-light: #D1FAE5;
            --c-done-dark: #059669;
            --c-text: #1E293B;
            --c-muted: #94A3B8;
            --c-border: #E2E8F0;
            --radius: 18px;
            --radius-sm: 12px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Nunito', sans-serif;
            background: var(--c-bg);
            color: var(--c-text);
            min-height: 100dvh;
            overscroll-behavior: none;
        }

        /* ── LOADING ── */
        #loadingScreen {
            position: fixed; inset: 0; background: var(--c-white);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; gap: 14px;
        }
        .loader-truck {
            font-size: 48px;
            animation: truck 1s ease-in-out infinite alternate;
        }
        @keyframes truck { from { transform: translateX(-8px); } to { transform: translateX(8px); } }
        .loader-text { font-size: 14px; color: var(--c-muted); font-weight: 600; }

        /* ── ACCESS DENIED ── */
        #accessDeniedScreen {
            position: fixed; inset: 0; background: var(--c-white);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; padding: 32px; text-align: center; gap: 12px;
        }
        #accessDeniedScreen h2 { font-size: 22px; font-weight: 800; }
        #accessDeniedScreen p { font-size: 14px; color: var(--c-muted); }

        /* ── LAYOUT ── */
        #mainApp { display: none; flex-direction: column; height: 100dvh; }

        /* ── HEADER ── */
        .header {
            background: linear-gradient(135deg, #1E293B 0%, #334155 100%);
            color: white;
            padding: 48px 20px 20px;
            flex-shrink: 0;
        }
        .header-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 16px; }
        .header-title { font-size: 22px; font-weight: 900; letter-spacing: -0.5px; }
        .header-subtitle { font-size: 12px; color: #94A3B8; margin-top: 2px; font-weight: 600; }
        .refresh-btn {
            width: 40px; height: 40px; background: rgba(255,255,255,0.1);
            border: none; border-radius: 50%; cursor: pointer; color: white;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.2s; flex-shrink: 0;
        }
        .refresh-btn:active { background: rgba(255,255,255,0.2); transform: scale(0.92); }

        /* Stats chips */
        .header-stats { display: flex; gap: 8px; flex-wrap: wrap; }
        .stat-chip {
            display: flex; align-items: center; gap: 6px;
            padding: 6px 12px; border-radius: 100px;
            font-size: 12px; font-weight: 700;
        }
        .stat-chip.paid-chip   { background: rgba(245,158,11,0.2); color: #FCD34D; }
        .stat-chip.deliv-chip  { background: rgba(59,130,246,0.2); color: #93C5FD; }
        .stat-chip.done-chip   { background: rgba(16,185,129,0.2); color: #6EE7B7; }
        .stat-chip .dot { width: 6px; height: 6px; border-radius: 50%; }
        .paid-chip .dot   { background: #FCD34D; }
        .deliv-chip .dot  { background: #93C5FD; }
        .done-chip .dot   { background: #6EE7B7; }

        /* ── TABS ── */
        .tabs {
            display: flex; gap: 4px;
            padding: 12px 16px;
            background: var(--c-white);
            border-bottom: 1px solid var(--c-border);
            flex-shrink: 0;
            overflow-x: auto;
        }
        .tabs::-webkit-scrollbar { display: none; }
        .tab-btn {
            display: flex; align-items: center; gap: 6px;
            padding: 8px 14px; border-radius: 100px;
            border: none; cursor: pointer;
            font-family: 'Nunito', sans-serif;
            font-size: 13px; font-weight: 700;
            white-space: nowrap;
            background: var(--c-bg); color: var(--c-muted);
            transition: all 0.2s;
        }
        .tab-btn .badge {
            min-width: 18px; height: 18px; padding: 0 5px;
            border-radius: 100px; font-size: 10px; font-weight: 800;
            display: flex; align-items: center; justify-content: center;
            background: #E2E8F0; color: #64748B;
        }
        .tab-btn.active-paid   { background: var(--c-paid-light);       color: var(--c-paid-dark); }
        .tab-btn.active-paid .badge   { background: var(--c-paid);     color: white; }
        .tab-btn.active-deliv  { background: var(--c-delivering-light); color: var(--c-delivering-dark); }
        .tab-btn.active-deliv .badge  { background: var(--c-delivering); color: white; }
        .tab-btn.active-done   { background: var(--c-done-light);        color: var(--c-done-dark); }
        .tab-btn.active-done .badge   { background: var(--c-done);      color: white; }

        /* ── ORDERS SCROLL ── */
        #ordersContainer {
            flex: 1; overflow-y: auto; padding: 16px;
            display: flex; flex-direction: column; gap: 12px;
        }
        #ordersContainer::-webkit-scrollbar { display: none; }

        /* ── ORDER CARD ── */
        .order-card {
            background: var(--c-white);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            animation: slideUp 0.25s ease-out forwards;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .card-accent { height: 4px; }
        .status-paid       .card-accent { background: linear-gradient(90deg, var(--c-paid), #FB923C); }
        .status-delivering .card-accent { background: linear-gradient(90deg, var(--c-delivering), #6366F1); }
        .status-done       .card-accent { background: linear-gradient(90deg, var(--c-done), #06B6D4); }

        .card-header { padding: 14px 16px 12px; cursor: pointer; }
        .card-header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
        .order-id { font-size: 11px; font-weight: 800; color: var(--c-muted); letter-spacing: 0.5px; text-transform: uppercase; }

        .status-badge {
            display: flex; align-items: center; gap: 4px;
            padding: 3px 10px; border-radius: 100px;
            font-size: 11px; font-weight: 800;
        }
        .badge-paid       { background: var(--c-paid-light);       color: var(--c-paid-dark); }
        .badge-delivering { background: var(--c-delivering-light); color: var(--c-delivering-dark); }
        .badge-done       { background: var(--c-done-light);        color: var(--c-done-dark); }

        .patient-name { font-size: 17px; font-weight: 800; line-height: 1.2; }
        .patient-meta { font-size: 12px; color: var(--c-muted); font-weight: 600; margin-top: 2px; }

        .card-location {
            display: flex; align-items: center; gap: 6px;
            margin-top: 10px; padding: 8px 12px;
            background: var(--c-bg); border-radius: var(--radius-sm);
        }
        .location-icon { font-size: 14px; flex-shrink: 0; }
        .location-text { font-size: 13px; font-weight: 700; color: var(--c-text); }
        .chevron { margin-left: auto; font-size: 12px; color: var(--c-muted); transition: transform 0.25s; }
        .chevron.open { transform: rotate(180deg); }

        /* Details expand */
        .card-details {
            max-height: 0; overflow: hidden;
            transition: max-height 0.3s cubic-bezier(0.4,0,0.2,1), opacity 0.25s;
            opacity: 0;
        }
        .card-details.open { max-height: 600px; opacity: 1; }
        .details-inner { padding: 0 16px 4px; border-top: 1px solid var(--c-border); }

        /* Detail row */
        .detail-row { padding: 10px 0; border-bottom: 1px solid var(--c-border); }
        .detail-row:last-child { border-bottom: none; }
        .detail-label { font-size: 10px; font-weight: 800; color: var(--c-muted); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 3px; }
        .detail-value { font-size: 13px; font-weight: 700; color: var(--c-text); }

        /* Phone link */
        .phone-link {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 14px; margin: 10px 0;
            background: #F0FDF4; border: 1.5px solid #BBF7D0;
            border-radius: var(--radius-sm); text-decoration: none;
            transition: all 0.15s;
        }
        .phone-link:active { transform: scale(0.98); }
        .phone-icon {
            width: 34px; height: 34px; border-radius: 50%;
            background: var(--c-done); color: white;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; flex-shrink: 0;
        }
        .phone-label { font-size: 10px; font-weight: 800; color: var(--c-done-dark); text-transform: uppercase; letter-spacing: 0.5px; }
        .phone-number { font-size: 15px; font-weight: 800; color: #065F46; }

        /* Map buttons */
        .map-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
        .map-btn {
            display: flex; align-items: center; justify-content: center; gap: 5px;
            padding: 9px 0; border-radius: var(--radius-sm); border: none;
            font-family: 'Nunito', sans-serif; font-size: 12px; font-weight: 800;
            cursor: pointer; transition: all 0.15s;
        }
        .map-btn:active { transform: scale(0.96); }
        .map-google { background: #DBEAFE; color: #1D4ED8; }
        .map-yandex { background: #FEF3C7; color: #92400E; }

        /* ── ACTION BUTTONS ── */
        .card-actions { padding: 12px 16px 16px; display: flex; gap: 8px; }

        .action-btn {
            flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px;
            height: 46px; border-radius: var(--radius-sm); border: none;
            font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 800;
            cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden;
        }
        .action-btn:active { transform: scale(0.97); }
        .action-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        .btn-start    { background: var(--c-delivering); color: white; }
        .btn-start:hover { background: var(--c-delivering-dark); }

        .btn-done     { background: var(--c-done); color: white; }
        .btn-done:hover { background: var(--c-done-dark); }

        .btn-info {
            flex: 0 0 46px; background: var(--c-bg); color: var(--c-muted);
            border: 1.5px solid var(--c-border);
        }

        /* Done card style */
        .done-card { opacity: 0.7; }
        .done-card .card-header { cursor: pointer; }

        /* ── EMPTY STATE ── */
        .empty-state {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; padding: 60px 20px; gap: 12px; text-align: center;
        }
        .empty-icon { font-size: 56px; }
        .empty-title { font-size: 17px; font-weight: 800; color: var(--c-text); }
        .empty-sub { font-size: 13px; color: var(--c-muted); font-weight: 600; }

        /* ── SKELETON ── */
        .skel {
            background: linear-gradient(90deg, #F1F5F9 25%, #E2E8F0 50%, #F1F5F9 75%);
            background-size: 200% 100%;
            animation: skel 1.4s infinite; border-radius: 8px;
        }
        @keyframes skel { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* ── TOAST ── */
        .toast {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
            background: #1E293B; color: white;
            padding: 12px 24px; border-radius: 100px;
            font-size: 14px; font-weight: 700;
            z-index: 999; white-space: nowrap;
            animation: toastIn 0.25s ease-out;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
        }
        @keyframes toastIn { from { opacity:0; bottom:8px; } to { opacity:1; bottom:24px; } }

        /* ── MODAL ── */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.5);
            z-index: 200; display: none; align-items: flex-end;
            backdrop-filter: blur(4px);
        }
        .modal-overlay.open { display: flex; }
        .modal-sheet {
            background: var(--c-white); border-radius: 24px 24px 0 0;
            padding: 0 0 32px; width: 100%; max-height: 90dvh; overflow-y: auto;
            animation: sheetUp 0.3s cubic-bezier(0.34,1.56,0.64,1);
        }
        @keyframes sheetUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .modal-handle { width: 40px; height: 4px; background: #E2E8F0; border-radius: 2px; margin: 12px auto 20px; }
        .modal-title { font-size: 18px; font-weight: 900; padding: 0 20px 16px; border-bottom: 1px solid var(--c-border); }
        .modal-body { padding: 16px 20px; }
        .modal-row { padding: 10px 0; border-bottom: 1px solid var(--c-border); }
        .modal-row:last-child { border-bottom: none; }
        .modal-label { font-size: 11px; font-weight: 800; color: var(--c-muted); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 4px; }
        .modal-value { font-size: 15px; font-weight: 700; }
        .modal-close-btn {
            margin: 4px 20px 0; width: calc(100% - 40px);
            height: 48px; background: var(--c-bg); border: none;
            border-radius: var(--radius-sm); font-family: 'Nunito', sans-serif;
            font-size: 15px; font-weight: 800; color: var(--c-muted); cursor: pointer;
        }

        /* Spinning icon */
        .spin { animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .section-title {
            font-size: 11px; font-weight: 800; color: var(--c-muted);
            text-transform: uppercase; letter-spacing: 0.8px;
            padding: 4px 4px 8px;
        }
    </style>
</head>
<body>

<!-- Loading -->
<div id="loadingScreen">
    <div class="loader-truck">🚚</div>
    <p class="loader-text">Yuklanmoqda...</p>
</div>

<!-- Access Denied -->
<div id="accessDeniedScreen">
    <div style="font-size:56px">🚫</div>
    <h2>Ruxsat yo'q</h2>
    <p>Ushbu panel faqat kuryerlar uchun. Agar siz kuryersiz, admindan murojaat qiling.</p>
</div>

<!-- Main App -->
<div id="mainApp" style="display:none; flex-direction:column; height:100dvh;">

    <!-- Header -->
    <div class="header">
        <div class="header-top">
            <div>
                <div class="header-title">🚗 Kuryer Paneli</div>
                <div class="header-subtitle" id="courierInfo">ID yuklanyapti...</div>
            </div>
            <button class="refresh-btn" onclick="loadOrders()" title="Yangilash">
                <svg id="refreshIcon" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99"/>
                </svg>
            </button>
        </div>
        <div class="header-stats" id="headerStats">
            <div class="stat-chip paid-chip"><div class="dot"></div><span id="countPaid">0</span> kutmoqda</div>
            <div class="stat-chip deliv-chip"><div class="dot"></div><span id="countDeliv">0</span> yo'lda</div>
            <div class="stat-chip done-chip"><div class="dot"></div><span id="countDone">0</span> yetkazildi</div>
        </div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
        <button class="tab-btn active-paid" id="tab-paid" onclick="setTab('paid')">
            🟡 Kutmoqda <span class="badge" id="tbadge-paid">0</span>
        </button>
        <button class="tab-btn" id="tab-delivering" onclick="setTab('delivering')">
            🔵 Yo'lda <span class="badge" id="tbadge-delivering">0</span>
        </button>
        <button class="tab-btn" id="tab-done" onclick="setTab('done')">
            🟢 Yetkazildi <span class="badge" id="tbadge-done">0</span>
        </button>
    </div>

    <!-- Orders -->
    <div id="ordersContainer"></div>
</div>

<!-- Order Detail Modal -->
<div class="modal-overlay" id="detailModal" onclick="closeModal(event)">
    <div class="modal-sheet">
        <div class="modal-handle"></div>
        <div class="modal-title" id="modalTitle">Zakaz ma'lumotlari</div>
        <div class="modal-body" id="modalBody"></div>
        <button class="modal-close-btn" onclick="closeModalDirect()">Yopish</button>
    </div>
</div>

<script>
// ── STATE ──
let tgId = '8558252080';
let allOrders = [];
let currentTab = 'paid';
let expandedId = null;

const STATUS_LABEL = {
    paid:       '⏳ Boshlashni kutmoqda',
    delivering: '🚗 Yo\'lda',
    done:       '✅ Yetkazildi',
};

// ── TELEGRAM INIT ──
if (window.Telegram?.WebApp) {
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.enableClosingConfirmation();
    if (tg.initDataUnsafe?.user?.id) {
        tgId = String(tg.initDataUnsafe.user.id);
    }
}

// ── INIT ──
document.addEventListener('DOMContentLoaded', init);

function init() {
    fetch(`/api/courier/staff/me?tg_id=${tgId}`)
        .then(r => r.json())
        .then(data => {
            document.getElementById('loadingScreen').style.display = 'none';

            if (!['courier', 'admin'].includes(data.role)) {
                document.getElementById('accessDeniedScreen').style.display = 'flex';
                return;
            }

            const name = data.firstName ? data.firstName + ' · ' : '';
            const region = data.regionName ? data.regionName : 'Tuman belgilanmagan';
            document.getElementById('courierInfo').textContent = `${name}📍 ${region}`;

            const app = document.getElementById('mainApp');
            app.style.display = 'flex';
            loadOrders();
        })
        .catch(() => {
            document.getElementById('loadingScreen').style.display = 'none';
            const app = document.getElementById('mainApp');
            app.style.display = 'flex';
            loadOrders();
        });
}

// ── LOAD ORDERS ──
function loadOrders() {
    const container = document.getElementById('ordersContainer');
    const icon = document.getElementById('refreshIcon');
    icon.classList.add('spin');

    container.innerHTML = `
        <div style="display:flex;flex-direction:column;gap:12px;padding:16px">
            ${[1,2].map(() => `
                <div style="background:#fff;border-radius:18px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.06)">
                    <div style="height:4px" class="skel"></div>
                    <div style="padding:16px;display:flex;flex-direction:column;gap:10px">
                        <div class="skel" style="height:12px;width:40%;border-radius:6px"></div>
                        <div class="skel" style="height:20px;width:65%;border-radius:6px"></div>
                        <div class="skel" style="height:36px;width:100%;border-radius:10px"></div>
                        <div class="skel" style="height:44px;width:100%;border-radius:10px"></div>
                    </div>
                </div>
            `).join('')}
        </div>`;

    fetch(`/api/courier/orders?tg_id=${tgId}`)
        .then(r => r.json())
        .then(orders => {
            icon.classList.remove('spin');
            allOrders = Array.isArray(orders) ? orders : [];
            updateCounts();
            renderTab();
        })
        .catch(() => {
            icon.classList.remove('spin');
            container.innerHTML = `
                <div style="padding:32px;text-align:center">
                    <div style="font-size:40px;margin-bottom:12px">📡</div>
                    <div style="font-weight:800;color:#EF4444;margin-bottom:6px">Ulanishda xatolik</div>
                    <div style="font-size:13px;color:#94A3B8">Internetni tekshirib, qayta urinib ko'ring</div>
                </div>`;
        });
}

// ── COUNTS ──
function updateCounts() {
    const tabs = ['paid', 'delivering', 'done'];
    tabs.forEach(s => {
        const c = allOrders.filter(o => o.status === s).length;
        document.getElementById(`countPaid`).textContent   = allOrders.filter(o=>o.status==='paid').length;
        document.getElementById(`countDeliv`).textContent  = allOrders.filter(o=>o.status==='delivering').length;
        document.getElementById(`countDone`).textContent   = allOrders.filter(o=>o.status==='done').length;
        document.getElementById(`tbadge-${s}`).textContent = allOrders.filter(o=>o.status===s).length;
    });
}

// ── TABS ──
function setTab(tab) {
    currentTab = tab;
    expandedId = null;

    const tabMap = { paid: 'active-paid', delivering: 'active-deliv', done: 'active-done' };
    ['paid','delivering','done'].forEach(t => {
        const btn = document.getElementById(`tab-${t}`);
        btn.className = 'tab-btn';
        if (t === tab) btn.classList.add(tabMap[t]);
    });

    renderTab();
}

// ── RENDER ──
function renderTab() {
    const container = document.getElementById('ordersContainer');
    container.style.padding = '16px';
    container.style.display = 'flex';
    container.style.flexDirection = 'column';
    container.style.gap = '12px';

    const filtered = allOrders.filter(o => o.status === currentTab);

    if (filtered.length === 0) {
        const msgs = {
            paid: { icon: '📋', title: 'Yangi zakaz yo\'q', sub: 'To\'langan zakazlar bu yerda chiqadi' },
            delivering: { icon: '🚗', title: 'Yo\'ldagi zakaz yo\'q', sub: 'Boshlangan zakazlar bu yerda ko\'rinadi' },
            done: { icon: '✅', title: 'Yetkazilgan zakaz yo\'q', sub: 'Bajarilgan zakazlar bu yerda ko\'rinadi' },
        };
        const m = msgs[currentTab];
        container.innerHTML = `
            <div class="empty-state">
                <div class="empty-icon">${m.icon}</div>
                <div class="empty-title">${m.title}</div>
                <div class="empty-sub">${m.sub}</div>
            </div>`;
        return;
    }

    container.innerHTML = filtered.map((o, i) => buildCard(o, i)).join('');
}

function buildCard(o, animIndex) {
    const id = o.orderId;
    const isExpanded = expandedId === id;
    const statusClass = `status-${o.status}`;
    const isDone = o.status === 'done';

    const badgeClass = { paid: 'badge-paid', delivering: 'badge-delivering', done: 'badge-done' }[o.status];
    const badgeIcon  = { paid: '⏳', delivering: '🚗', done: '✅' }[o.status];
    const badgeText  = { paid: 'Kutmoqda', delivering: 'Yo\'lda', done: 'Yetkazildi' }[o.status];

    // Action buttons
    let actionBtns = '';
    if (o.status === 'paid') {
        actionBtns = `
            <button class="action-btn btn-info" onclick="event.stopPropagation();openDetail('${id}')" title="Batafsil">
                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M11.25 11.25l.041-.02a.75.75 0 011.063.852l-.708 2.836a.75.75 0 001.063.853l.041-.021M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-9-3.75h.008v.008H12V8.25z"/></svg>
            </button>
            <button class="action-btn btn-start" id="btn-start-${id}" onclick="event.stopPropagation();startDelivery('${id}')">
                🚗 Yo'lga chiqish
            </button>`;
    } else if (o.status === 'delivering') {
        actionBtns = `
            <button class="action-btn btn-info" onclick="event.stopPropagation();openDetail('${id}')" title="Batafsil">
                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M11.25 11.25l.041-.02a.75.75 0 011.063.852l-.708 2.836a.75.75 0 001.063.853l.041-.021M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-9-3.75h.008v.008H12V8.25z"/></svg>
            </button>
            <button class="action-btn btn-done" id="btn-done-${id}" onclick="event.stopPropagation();markDone('${id}')">
                ✅ Namuna olindi
            </button>`;
    }

    const detailsHtml = buildDetails(o);

    return `
        <div class="order-card ${statusClass} ${isDone ? 'done-card' : ''}" style="animation-delay:${animIndex * 0.05}s">
            <div class="card-accent"></div>
            <div class="card-header" onclick="toggleExpand('${id}')">
                <div class="card-header-top">
                    <span class="order-id">ZAKAZ #${id}</span>
                    <span class="status-badge ${badgeClass}">${badgeIcon} ${badgeText}</span>
                </div>
                <div class="patient-name">${esc(o.patientName)}</div>
                <div class="patient-meta">
                    ${o.patientAge ? o.patientAge + ' yosh' : ''}
                    ${o.serviceName ? ' · ' + esc(o.serviceName) : ''}
                    ${o.createdAt ? ' · ' + o.createdAt : ''}
                </div>
                <div class="card-location">
                    <span class="location-icon">📍</span>
                    <span class="location-text">${esc(o.districtName)}</span>
                    <span class="chevron ${isExpanded ? 'open' : ''}">▼</span>
                </div>
            </div>

            <div class="card-details ${isExpanded ? 'open' : ''}" id="det-${id}">
                <div class="details-inner">
                    ${detailsHtml}
                </div>
            </div>

            ${!isDone ? `<div class="card-actions">${actionBtns}</div>` : ''}
        </div>`;
}

function buildDetails(o) {
    let html = '';

    if (o.addressNote) {
        html += `<div class="detail-row">
            <div class="detail-label">📍 Manzil izohi</div>
            <div class="detail-value">${esc(o.addressNote)}</div>
        </div>`;
    }

    if (o.phone) {
        html += `
        <a href="tel:${o.phone.replace(/\s+/g,'')}" onclick="event.stopPropagation()" class="phone-link">
            <div class="phone-icon">📞</div>
            <div>
                <div class="phone-label">Telefon raqam</div>
                <div class="phone-number">${esc(o.phone)}</div>
            </div>
        </a>`;
    }

    if (o.pickupSlot || o.deliverySlot) {
        html += `<div class="detail-row">
            <div class="detail-label">🕒 Vaqt oynasi</div>
            <div class="detail-value">
                ${o.pickupSlot ? '⬆️ Olib ketish: ' + o.pickupSlot : ''}
                ${o.deliverySlot ? (o.pickupSlot ? ' &nbsp;|&nbsp; ' : '') + '📦 Yetkazish: ' + o.deliverySlot : ''}
            </div>
        </div>`;
    }

    if (o.totalPrice) {
        html += `<div class="detail-row">
            <div class="detail-label">💰 To'lov miqdori</div>
            <div class="detail-value" style="color:#059669">${Number(o.totalPrice).toLocaleString()} so'm</div>
        </div>`;
    }

    if (o.latitude && o.longitude) {
        html += `
        <div style="margin-top:10px;margin-bottom:4px">
            <div class="detail-label" style="margin-bottom:8px">🗺 Xaritada ochish</div>
            <div class="map-btns">
                <button class="map-btn map-google" onclick="event.stopPropagation();openMap('google',${o.latitude},${o.longitude})">
                    🌐 Google Maps
                </button>
                <button class="map-btn map-yandex" onclick="event.stopPropagation();openMap('yandex',${o.latitude},${o.longitude})">
                    🗺 Yandex Maps
                </button>
            </div>
        </div>`;
    }

    if (!html) {
        html = `<div class="detail-row"><div class="detail-value" style="color:var(--c-muted)">Qo'shimcha ma'lumot yo'q</div></div>`;
    }

    return html;
}

// ── EXPAND ──
function toggleExpand(id) {
    const wasOpen = expandedId === id;
    expandedId = wasOpen ? null : id;

    // Update only chevrons and open/close without full re-render for smoothness
    document.querySelectorAll('.chevron').forEach(el => el.classList.remove('open'));
    document.querySelectorAll('.card-details').forEach(el => el.classList.remove('open'));

    if (!wasOpen) {
        const chevron = document.querySelector(`[onclick="toggleExpand('${id}')"] .chevron`);
        const details = document.getElementById(`det-${id}`);
        if (chevron) chevron.classList.add('open');
        if (details) details.classList.add('open');
    }
}

// ── ACTIONS ──
function startDelivery(id) {
    const btn = document.getElementById(`btn-start-${id}`);
    if (!btn || btn.disabled) return;
    setBtn(btn, true, '⏳ Yuborilmoqda...');

    fetch(`/api/courier/orders/${id}/start?tg_id=${tgId}`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' }
    })
    .then(r => r.json())
    .then(data => {
        if (data.success) {
            showToast('🚗 Yo\'lga chiqdingiz! Bemor xabardor qilindi.');
            // Optimistic update
            const order = allOrders.find(o => o.orderId === id);
            if (order) order.status = 'delivering';
            updateCounts();
            setTab('delivering');
        } else {
            showToast('⚠️ ' + (data.error || 'Xatolik yuz berdi'));
            setBtn(btn, false, '🚗 Yo\'lga chiqish');
        }
    })
    .catch(() => {
        showToast('❌ Ulanishda xatolik');
        setBtn(btn, false, '🚗 Yo\'lga chiqish');
    });
}

function markDone(id) {
    const btn = document.getElementById(`btn-done-${id}`);
    if (!btn || btn.disabled) return;
    setBtn(btn, true, '⏳ Yuborilmoqda...');

    fetch(`/api/courier/orders/${id}/done?tg_id=${tgId}`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' }
    })
    .then(r => r.json())
    .then(data => {
        if (data.success) {
            showToast('✅ Namuna olindi! Bemor xabardor qilindi.');
            const order = allOrders.find(o => o.orderId === id);
            if (order) order.status = 'done';
            updateCounts();
            setTab('done');
        } else {
            showToast('⚠️ ' + (data.error || 'Xatolik yuz berdi'));
            setBtn(btn, false, '✅ Namuna olindi');
        }
    })
    .catch(() => {
        showToast('❌ Ulanishda xatolik');
        setBtn(btn, false, '✅ Namuna olindi');
    });
}

function setBtn(btn, disabled, text) {
    btn.disabled = disabled;
    btn.textContent = text;
}

// ── DETAIL MODAL ──
function openDetail(id) {
    const o = allOrders.find(o => o.orderId === id);
    if (!o) return;

    document.getElementById('modalTitle').innerHTML = `
        <span style="font-size:14px;color:var(--c-muted);font-weight:700">ZAKAZ #${id}</span><br>
        ${esc(o.patientName)}`;

    let rows = [
        o.patientAge     ? ['👤 Bemor yoshi',    o.patientAge + ' yosh'] : null,
        o.serviceName    ? ['🧪 Xizmat',          o.serviceName]          : null,
        o.districtName   ? ['📍 Tuman',           o.districtName]         : null,
        o.addressNote    ? ['🏠 Manzil izohi',    o.addressNote]          : null,
        o.phone          ? ['📞 Telefon',          o.phone]                : null,
        o.pickupSlot     ? ['⬆️ Olib ketish vaqti', o.pickupSlot]         : null,
        o.deliverySlot   ? ['📦 Yetkazish vaqti', o.deliverySlot]         : null,
        o.totalPrice     ? ['💰 To\'lov',         Number(o.totalPrice).toLocaleString() + ' so\'m'] : null,
        o.createdAt      ? ['🕐 Yaratilgan',       o.createdAt]            : null,
        ['📊 Holati', STATUS_LABEL[o.status] || o.status],
    ].filter(Boolean);

    document.getElementById('modalBody').innerHTML = rows.map(([label, value]) => `
        <div class="modal-row">
            <div class="modal-label">${label}</div>
            <div class="modal-value">${esc(String(value))}</div>
        </div>`).join('') + (o.latitude && o.longitude ? `
        <div style="margin-top:12px">
            <div class="modal-label" style="margin-bottom:8px">🗺 Xaritada ochish</div>
            <div class="map-btns">
                <button class="map-btn map-google" onclick="openMap('google',${o.latitude},${o.longitude})">🌐 Google Maps</button>
                <button class="map-btn map-yandex" onclick="openMap('yandex',${o.latitude},${o.longitude})">🗺 Yandex Maps</button>
            </div>
        </div>` : '');

    document.getElementById('detailModal').classList.add('open');
}

function closeModal(e) {
    if (e.target === document.getElementById('detailModal')) closeModalDirect();
}
function closeModalDirect() {
    document.getElementById('detailModal').classList.remove('open');
}

// ── UTILS ──
function openMap(type, lat, lng) {
    if (type === 'yandex') {
        window.open(`https://yandex.uz/maps/?rtext=~${lat},${lng}&rtt=auto`, '_blank');
    } else {
        const isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent);
        if (isIOS) {
            window.open(`https://maps.apple.com/?daddr=${lat},${lng}&dirflg=d`, '_blank');
        } else {
            window.open(`http://maps.google.com/?q=${lat},${lng}&travelmode=driving`, '_blank');
        }
    }
}

let toastTimeout;
function showToast(msg) {
    clearTimeout(toastTimeout);
    document.querySelectorAll('.toast').forEach(el => el.remove());
    const el = document.createElement('div');
    el.className = 'toast';
    el.textContent = msg;
    document.body.appendChild(el);
    toastTimeout = setTimeout(() => el.remove(), 3000);
}

function esc(str) {
    if (!str) return '';
    return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
}
